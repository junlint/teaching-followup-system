server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tfdb}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expireSeconds: ${JWT_EXPIRE_SECONDS:86400}
  bootstrap:
    admin:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD}
